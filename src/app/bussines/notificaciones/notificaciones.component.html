<div class="p-6 bg-slate-50/50 min-h-screen">
  <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100 p-6">
    
    <div class="text-center pb-6 border-b border-slate-100">
      <div class="w-12 h-12 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-600 mx-auto mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 5a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v14a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1z" />
          <path d="M14 3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v18a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1z" />
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Reporte de Ventas por Mes</h2>
      <p class="text-sm text-slate-400 font-medium mt-1 max-w-md mx-auto">
        Selecciona un año fiscal para bajar las auditorías de venta. Los meses futuros permanecen bloqueados.
      </p>
    </div>

    <div class="py-5 flex items-center gap-3 justify-center bg-slate-50/50 my-4 rounded-xl border border-slate-100">
      <label for="anio" class="text-sm font-bold text-slate-500 uppercase tracking-wide flex items-center gap-1.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z" /><path d="M16 3v4" /><path d="M8 3v4" /><path d="M4 11h16" /><path d="M11 15h1" /><path d="M12 15v3" />
        </svg>
        Año Fiscal:
      </label>
      <select [(ngModel)]="anioSeleccionado" (change)="actualizarMesActual()"
        class="px-4 py-2 border-2 border-slate-200 rounded-xl font-semibold text-sm text-slate-700 bg-white focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all cursor-pointer">
        <option *ngFor="let anio of aniosDisponibles" [value]="anio">{{ anio }}</option>
      </select>
    </div>

    <div class="overflow-x-auto rounded-xl border-2 border-slate-100">
      <table class="min-w-full divide-y divide-slate-100 text-left">
        <thead class="bg-blue-950 text-white">
          <tr>
            <th scope="col" class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Mes de Gestión</th>
            <th scope="col" class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Estado de Cierre</th>
            <th scope="col" class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-right w-44">Acción</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-slate-100">
          <tr *ngFor="let mes of meses; let i = index" class="hover:bg-slate-50/40 transition-colors group">
            
            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-700">
              {{ mes }}
            </td>

            <td class="px-6 py-4 whitespace-nowrap">
              <span *ngIf="esMesDisponible(i)" class="inline-flex items-center gap-1.5 text-xs font-bold text-green-700 bg-green-50 border border-green-100 px-2.5 py-1 rounded-full">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                Disponible para descarga
              </span>
              <span *ngIf="!esMesDisponible(i)" class="inline-flex items-center gap-1.5 text-xs font-semibold text-slate-400 bg-slate-50 border border-slate-100 px-2.5 py-1 rounded-full italic">
                <span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
                Periodo no abierto
              </span>
            </td>

            <td class="px-6 py-4 whitespace-nowrap text-right">
              
              <button *ngIf="esMesDisponible(i)" 
                (click)="descargarExcel(i)"
                [disabled]="mesesCargando[i]"
                class="inline-flex items-center justify-center px-4 py-2 text-xs font-bold rounded-xl shadow-md transition-all select-none disabled:bg-slate-100 disabled:text-slate-400 disabled:shadow-none disabled:cursor-not-allowed
                       {{ mesesCargando[i] ? 'bg-slate-100 text-slate-400' : 'bg-blue-600 text-white hover:bg-blue-700 hover:shadow-blue-500/10 active:scale-95' }}">
                
                <svg *ngIf="mesesCargando[i]" class="animate-spin h-4 w-4 mr-1.5 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                
                <svg *ngIf="!mesesCargando[i]" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mr-1.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2" /><path d="M7 11l5 5l5 -5" /><path d="M12 4l0 12" />
                </svg>

                {{ mesesCargando[i] ? 'Generando...' : 'Descargar' }}
              </button>

              <span *ngIf="!esMesDisponible(i)" class="inline-flex items-center text-xs font-semibold text-slate-300 italic gap-1 justify-end w-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 12l14 0" />
                </svg>
                Bloqueado
              </span>

            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
