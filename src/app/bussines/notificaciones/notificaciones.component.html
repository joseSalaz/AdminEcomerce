<div class="p-8 bg-white shadow-xl rounded-2xl max-w-5xl mx-auto">
  <!-- Título centrado con animación -->
  <h2 class="text-4xl font-extrabold mb-6 text-gray-900 text-center flex items-center justify-center gap-3">
    <span class="animate-bounce">📊</span> Reporte de Ventas por Mes
  </h2>

  <!-- Descripción centrada -->
  <p class="text-gray-600 mb-6 text-lg text-center">
    Selecciona un año y descarga los reportes de ventas disponibles. No puedes descargar reportes de meses futuros.
  </p>

  <!-- Selección de Año centrado -->
  <div class="mb-6 flex items-center gap-4 justify-center">
    <label for="anio" class="text-lg font-semibold text-gray-800 flex items-center gap-2">
      📅 Año:
    </label>
    <select [(ngModel)]="anioSeleccionado" (change)="actualizarMesActual()"
      class="px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all duration-200">
      <option *ngFor="let anio of aniosDisponibles" [value]="anio">{{ anio }}</option>
    </select>
  </div>

  <!-- Tabla con mejoras -->
  <div class="overflow-x-auto">
    <table class="w-full bg-white border border-gray-300 rounded-2xl shadow-md">
      <!-- 🔹 Encabezado con color más oscuro -->
      <thead class="bg-blue-950 text-white text-lg">
        <tr>
          <th class="px-6 py-4 text-center rounded-tl-2xl">📅 Mes</th>
          <th class="px-6 py-4 text-center">📌 Estado</th>
          <th class="px-6 py-4 text-center rounded-tr-2xl">⚡ Acción</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let mes of meses; let i = index" class="border-t hover:bg-gray-100 transition-all duration-200">
          <!-- 🔹 Mes -->
          <td class="px-6 py-4 font-semibold text-gray-900 text-center">{{ mes }}</td>

          <!-- 🔹 Estado -->
          <td class="px-6 py-4 text-center">
            <span *ngIf="esMesDisponible(i)" class="text-green-600 font-bold flex items-center justify-center gap-2">
              ✅ Disponible
            </span>
            <span *ngIf="!esMesDisponible(i)" class="text-gray-500 italic flex items-center justify-center gap-2">
              ⏳ No disponible
            </span>
          </td>

          <!-- 🔹 Acción (Alineado con No Disponible) -->
          <td class="px-6 py-4 flex items-center justify-center">
            <button *ngIf="esMesDisponible(i)" (click)="descargarExcel(i)"
              class="bg-blue-600 text-white px-5 py-2 rounded-lg shadow-md transition-all duration-300 hover:bg-blue-800 hover:scale-105 active:scale-95 flex items-center justify-center gap-2">
              📥 Descargar
            </button>
            <span *ngIf="!esMesDisponible(i)"
              class="text-gray-400 italic flex items-center justify-center gap-2 w-32 text-center">
              📄 No disponible
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
