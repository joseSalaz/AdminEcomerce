<div class="fixed inset-0 flex items-center justify-center bg-gray-800 bg-opacity-75 z-50">

  <div class="w-full max-w-3xl p-8 bg-white rounded-lg shadow-xl transform transition-all duration-300 overflow-y-auto max-h-[90vh]">

    <h2 class="text-3xl font-semibold mb-6 text-center text-gray-800">

      {{ isEditMode ? 'Actualizar Libro' : 'Crear Libro' }}
    </h2>

    <!-- Alerta de éxito -->
    <div *ngIf="showSuccessAlert" class="mb-4 flex items-center p-4 bg-green-100 text-green-700 rounded-lg shadow-lg">
      <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2l4-4m5 2a9 9 0 11-18 0a9 9 0 0118 0z"></path>
      </svg>
      <p class="text-sm">{{ successMessage }}</p>
    </div>

    <!-- Alerta de error -->
    <div *ngIf="showErrorAlert" class="mb-4 flex items-center p-4 bg-red-100 text-red-700 rounded-lg shadow-lg">
      <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-.01-6a4 4 0 110 8a4 4 0 010-8zm0 0a8 8 0 100 16a8 8 0 000-16z"></path>
      </svg>
      <p class="text-sm">{{ errorMessage }}</p>
    </div>

    <form (ngSubmit)="onSubmit()" #libroForm="ngForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <!-- Título -->
      <div class="flex flex-col">
        <label for="titulo" class="block text-sm font-medium text-gray-600">Título</label>
        <input type="text" id="titulo" name="titulo" class="border border-gray-300 p-3 w-full rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" [(ngModel)]="libro.titulo" required />
      </div>

      <!-- ISBN -->
      <div class="flex flex-col">
        <label for="isbn" class="block text-sm font-medium text-gray-600">ISBN</label>
        <input type="text" id="isbn" name="isbn" class="border border-gray-300 p-3 w-full rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" [(ngModel)]="libro.isbn" />
      </div>

      <!-- Tamaño -->
      <div class="flex flex-col">
        <label for="tamanno" class="block text-sm font-medium text-gray-600">Tamaño</label>
        <input type="text" id="tamanno" name="tamanno" class="border border-gray-300 p-3 w-full rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" [(ngModel)]="libro.tamanno" />
      </div>

      <!-- Autor -->
      <div class="relative flex flex-col">
        <label for="buscarAutor" class="block text-sm font-medium text-gray-600">Autor</label>
        <div class="flex items-center">
          <input type="text" id="buscarAutor" placeholder="Buscar autor..." [(ngModel)]="buscarAutor" [ngModelOptions]="{standalone: true}" class="flex-grow border border-gray-300 p-3 rounded-l-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <button type="button" (click)="buscarAutores()" class="bg-blue-500 text-white px-4 py-2 rounded-md text-sm hover:bg-blue-600 focus:outline-none">Buscar</button>
        </div>
        <ul *ngIf="autoresFiltrados.length > 0" class="absolute z-10 mt-1 w-full bg-white border border-gray-300 rounded-md max-h-40 overflow-y-auto shadow-lg">
          <li *ngFor="let autor of autoresFiltrados" (click)="seleccionarAutor(autor)" class="px-4 py-2 hover:bg-gray-100 cursor-pointer text-sm">
            {{ autor.nombre }} {{ autor.apellido }}
          </li>
        </ul>
        <p *ngIf="autoresFiltrados.length === 0 && buscarAutor.trim().length > 0 && mostrarMensaje" class="mt-2 text-sm text-gray-500">No se encontraron resultados.</p>
        <button type="button" *ngIf="autoresFiltrados.length === 0 && buscarAutor.trim().length > 0 && mostrarMensaje" (click)="abrirCrearAutorModal()" class="mt-2 bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600 focus:outline-none">Crear Autor</button>
      </div>
      <app-matenimiento-autor *ngIf="mostrarModalCrearAutor" (autorCreado)="recibirAutorCreado($event)"
        (cerrarModal)="cerrarCrearAutorModal()">
      </app-matenimiento-autor>

      <!-- Descripción -->
      <div class="md:col-span-2 flex flex-col">
        <label for="descripcion" class="block text-sm font-medium text-gray-600">Descripción</label>
        <textarea id="descripcion" name="descripcion" class="border border-gray-300 p-3 w-full rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" [(ngModel)]="libro.descripcion"></textarea>
      </div>

      <!-- Condición -->
      <div class="flex flex-col">
        <label for="condicion" class="block text-sm font-medium text-gray-600">Condición</label>
        <input type="text" id="condicion" name="condicion" class="border border-gray-300 p-3 w-full rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" [(ngModel)]="libro.condicion" />
      </div>

      <!-- Impresión -->
      <div class="flex flex-col">
        <label for="impresion" class="block text-sm font-medium text-gray-600">Impresión</label>
        <input type="text" id="impresion" name="impresion" class="border border-gray-300 p-3 w-full rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" [(ngModel)]="libro.impresion" />
      </div>

      <!-- Tipo de Tapa -->
      <div class="flex flex-col">
        <label for="tipoTapa" class="block text-sm font-medium text-gray-600">Tipo de Tapa</label>
        <input type="text" id="tipoTapa" name="tipoTapa" class="border border-gray-300 p-3 w-full rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" [(ngModel)]="libro.tipoTapa" />
      </div>

      <!-- Estado -->
      <div class="flex items-center">
        <input type="checkbox" id="estado" name="estado" class="mr-2 focus:ring-blue-500" [(ngModel)]="libro.estado" />
        <label for="estado" class="text-sm font-medium text-gray-600">Estado</label>
      </div>

      <!-- Subcategoría -->
      <div class="flex flex-col">
        <label for="idSubcategoria" class="block text-sm font-medium text-gray-600">Subcategoría</label>
        <select id="idSubcategoria" [(ngModel)]="libro.idSubcategoria" name="idSubcategoria" required class="border border-gray-300 p-3 w-full rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option *ngFor="let sub of subCategoria" [value]="sub.id">{{ sub.descripcion }}</option>
        </select>
      </div>

      <!-- Tipo de Papel -->
      <div class="flex flex-col">
        <label for="idTipoPapel" class="block text-sm font-medium text-gray-600">Tipo de Papel</label>
        <select id="idTipoPapel" [(ngModel)]="libro.idTipoPapel" name="idTipoPapel" required class="border border-gray-300 p-3 w-full rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option *ngFor="let tipo of tiposPapel" [value]="tipo.idTipoPapel">{{ tipo.descripcion }}</option>
        </select>
      </div>

      <!-- Proveedor -->
      <div class="flex flex-col">
        <label for="idProveedor" class="block text-sm font-medium text-gray-600">Proveedor</label>
        <select id="idProveedor" [(ngModel)]="libro.idProveedor" name="idProveedor" required class="border border-gray-300 p-3 w-full rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option *ngFor="let prov of provedor" [value]="prov.idProveedor">{{ prov.razonSocial }}</option>
        </select>
      </div>

      <!-- Precio de Venta -->
      <div class="flex flex-col">
        <label for="precioVenta" class="block text-sm font-medium text-gray-600">Precio de Venta</label>
        <input type="number" id="precioVenta" name="precioVenta" class="border border-gray-300 p-3 w-full rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" [(ngModel)]="precioVenta" required />
      </div>

      <!-- Stock -->
      <div class="flex flex-col">
        <label for="Stock" class="block text-sm font-medium text-gray-600">Stock</label>
        <input type="number" id="Stock" name="Stock" class="border border-gray-300 p-3 w-full rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" [(ngModel)]="Stock" required />
      </div>

      <!-- Previsualización de la imagen -->
      <div *ngIf="imageUrl" class="md:col-span-2 flex flex-col items-center mt-6">
        <label class="block text-sm font-medium text-gray-600">Imagen Previsualizada</label>
        <div class="w-full max-w-lg h-72 bg-gray-100 rounded-md overflow-hidden relative flex items-center justify-center border border-gray-300">
          <img [src]="imageUrl" alt="Previsualización" class="max-h-full max-w-full object-contain" />
          <button (click)="removeImage()" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-2 hover:bg-red-600 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Subir imagen -->
      <div class="md:col-span-2 flex flex-col mt-4">
        <label for="imagen" class="block text-sm font-medium text-gray-600">Imagen</label>
        <input type="file" id="imagen" name="imagen" class="border border-gray-300 block w-full text-sm focus:outline-none p-3 rounded-md" (change)="onImageSelected($event)" />
      </div>

      <!-- Botones -->
      <div class="md:col-span-2 flex justify-end gap-6 mt-6">
        <button type="button" (click)="onClose()" class="px-6 py-2 bg-red-500 text-white rounded-md hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-red-400">Cancelar</button>
        <button type="submit" class="px-6 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-400">{{ isEditMode ? 'Actualizar' : 'Crear' }}</button>
      </div>

    </form>
  </div>

</div>
