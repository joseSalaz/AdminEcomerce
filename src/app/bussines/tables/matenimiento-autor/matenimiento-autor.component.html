<form (ngSubmit)="crearAutor()" #form="ngForm" class="space-y-4">
  
  <div class="grid grid-cols-2 gap-4">
    <div class="flex flex-col group">
      <label for="nombre" class="text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Nombre <span class="text-red-500">*</span></label>
      <input id="nombre" type="text" [(ngModel)]="nuevoAutor.nombre" name="nombre" required placeholder="Ej. Gabriel" class="border-2 border-slate-200 p-3 w-full rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 placeholder-slate-300 font-semibold text-sm" />
    </div>

    <div class="flex flex-col group">
      <label for="apellido" class="text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Apellido <span class="text-red-500">*</span></label>
      <input id="apellido" type="text" [(ngModel)]="nuevoAutor.apellido" name="apellido" required placeholder="Ej. García M." class="border-2 border-slate-200 p-3 w-full rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 placeholder-slate-300 font-semibold text-sm" />
    </div>
  </div>

  <div class="flex flex-col group">
    <label for="codigo" class="text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Código Sistema <span class="text-red-500">*</span></label>
    <input id="codigo" type="text" [(ngModel)]="nuevoAutor.codigo" name="codigo" required placeholder="AUT-001" class="border-2 border-slate-200 p-3 w-full rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 placeholder-slate-300 font-mono font-bold text-sm" />
  </div>

  <div class="flex flex-col group">
    <label for="descripcion" class="text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Descripción o Reseña <span class="text-red-500">*</span></label>
    <textarea id="descripcion" [(ngModel)]="nuevoAutor.descripcion" name="descripcion" required rows="3" placeholder="Escribe detalles sobre el origen, especialidad o hitos literarios del autor..." class="border-2 border-slate-200 p-3 w-full rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all resize-none text-slate-700 placeholder-slate-300 font-medium text-sm"></textarea>
  </div>

  <div class="flex justify-end gap-3 pt-5 border-t border-slate-100 bg-slate-50/20 -mx-6 -mb-6 p-6">
    <button type="button" (click)="cerrarModalHandler()" class="px-5 py-3 bg-white border-2 border-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-50 hover:border-slate-300 transition-all text-sm flex items-center gap-1.5">
      <ng-icon name="tablerX" class="text-lg"></ng-icon>
      Cancelar
    </button>
    <button type="submit" [disabled]="!form.form.valid" class="flex items-center gap-2 px-6 py-3 {{ isEditMode ? 'bg-amber-500 hover:bg-amber-600 shadow-lg shadow-amber-500/25' : 'bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-500/25' }} text-white rounded-xl font-bold transition-all text-sm disabled:bg-slate-200 disabled:text-slate-400 disabled:shadow-none disabled:cursor-not-allowed cursor-pointer">
      <ng-icon name="tablerDeviceFloppy" class="text-lg"></ng-icon>
      {{ isEditMode ? 'Actualizar Autor' : 'Guardar Autor' }}
    </button>
  </div>

</form>
