<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-blue-50/30">
      <!-- Header Section -->
      <div class="bg-white border-b border-slate-200/60 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-6">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
                </svg>
              </div>
              <div>
                <h1 class="text-xl font-bold text-slate-800">Gestión de Biblioteca</h1>
                <p class="text-xs text-slate-500">Administra tu colección de libros</p>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <button class="p-2 rounded-lg hover:bg-slate-100 text-slate-500 hover:text-slate-700 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 6H5a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h13l4-3.5L18 6Z"/>
                  <path d="M12 13v8"/>
                  <path d="M12 3v3"/>
                </svg>
              </button>
              <button class="p-2 rounded-lg hover:bg-slate-100 text-slate-500 hover:text-slate-700 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Tabs Navigation -->
      <div class="bg-white/80 backdrop-blur-sm border-b border-slate-200/60 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-6">
          <nav class="flex gap-1 overflow-x-auto scrollbar-hide">
            <button (click)="activeTab = 'libros'"
              [class]="activeTab === 'libros' 
                ? 'flex items-center gap-2 px-4 py-4 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 bg-blue-50/50 rounded-t-lg transition-all'
                : 'flex items-center gap-2 px-4 py-4 text-sm font-medium text-slate-500 hover:text-slate-700 hover:bg-slate-50 rounded-t-lg transition-all'">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
              </svg>
              Libros
              <span class="px-2 py-0.5 text-xs font-semibold bg-blue-100 text-blue-700 rounded-full">12</span>
            </button>

            <button (click)="activeTab = 'subcategorias'"
              [class]="activeTab === 'subcategorias'
                ? 'flex items-center gap-2 px-4 py-4 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 bg-blue-50/50 rounded-t-lg transition-all'
                : 'flex items-center gap-2 px-4 py-4 text-sm font-medium text-slate-500 hover:text-slate-700 hover:bg-slate-50 rounded-t-lg transition-all'">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                <line x1="12" x2="12" y1="11" y2="17"/>
                <line x1="9" x2="15" y1="14" y2="14"/>
              </svg>
              Subcategorías
            </button>

            <button (click)="activeTab = 'autores'"
              [class]="activeTab === 'autores'
                ? 'flex items-center gap-2 px-4 py-4 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 bg-blue-50/50 rounded-t-lg transition-all'
                : 'flex items-center gap-2 px-4 py-4 text-sm font-medium text-slate-500 hover:text-slate-700 hover:bg-slate-50 rounded-t-lg transition-all'">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              Autores
            </button>
          </nav>
        </div>
      </div>

      <!-- Content Area -->
      <div class="max-w-6xl mx-auto px-6 py-8">
        <div class="animate-fade-in">
          <app-list-libro *ngIf="activeTab === 'libros'"></app-list-libro>
          <app-list-subcategoria *ngIf="activeTab === 'subcategorias'"></app-list-subcategoria>
          <app-list-autor *ngIf="activeTab === 'autores'"></app-list-autor>
        </div>
      </div>
    </div>
