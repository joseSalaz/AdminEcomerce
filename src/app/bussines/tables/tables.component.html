<div class="container mx-auto p-4 max-w-5xl">

  <div class="flex space-x-6 border-b border-gray-200 mb-6 text-sm">
    <button (click)="activeTab = 'libros'" 
      [class]="activeTab === 'libros' ? 'text-blue-600 border-b-2 border-blue-600 pb-2 font-semibold transition-all' : 'text-gray-500 pb-2 hover:text-gray-800 transition-all'">
      📖 Libros
    </button>
    <button (click)="activeTab = 'subcategorias'" 
      [class]="activeTab === 'subcategorias' ? 'text-blue-600 border-b-2 border-blue-600 pb-2 font-semibold transition-all' : 'text-gray-500 pb-2 hover:text-gray-800 transition-all'">
      📁 Subcategorías
    </button>
    <button (click)="activeTab = 'autores'" 
      [class]="activeTab === 'autores' ? 'text-blue-600 border-b-2 border-blue-600 pb-2 font-semibold transition-all' : 'text-gray-500 pb-2 hover:text-gray-800 transition-all'">
      🖋️ Autores
    </button>
  </div>

  <div *ngIf="activeTab === 'libros'" class="animate-fade-in">
    <app-list-libro></app-list-libro>
  </div>

  <div *ngIf="activeTab === 'subcategorias'" class="animate-fade-in">
    <app-list-subcategoria></app-list-subcategoria>
  </div>
<div *ngIf="activeTab === 'autores'" class="animate-fade-in">
    <app-list-autor></app-list-autor>
  </div>
</div>
