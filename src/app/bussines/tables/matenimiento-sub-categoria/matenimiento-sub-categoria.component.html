<div class="space-y-5">
  <div class="flex flex-col group">
    <label for="descripcion" class="flex items-center gap-2 text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wide">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="17" y1="12" x2="10" y2="12"></line><line x1="7" y1="12" x2="17" y2="12"></line>
      </svg>
      Descripción <span class="text-red-500 ml-1">*</span>
    </label>
    <input
      id="descripcion"
      type="text"
      [(ngModel)]="subcategoria.descripcion"
      class="border-2 border-slate-200 p-3.5 w-full rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 placeholder-slate-300 font-medium text-sm"
      placeholder="Ej. Novelas Históricas, Ciencia Ficción..."
    />
  </div>

  <div class="flex flex-col group">
    <label for="categoria" class="flex items-center gap-2 text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wide">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      Categoría Padre <span class="text-red-500 ml-1">*</span>
    </label>
    <div class="relative">
      <select
        id="categoria"
        [(ngModel)]="subcategoria.idCategoria"
        class="appearance-none border-2 border-slate-200 p-3.5 pr-10 w-full rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-white transition-all cursor-pointer font-semibold text-slate-700 text-sm"
      >
        <option value="" disabled selected class="text-slate-300">Selecciona la categoría padre</option>
        <option *ngFor="let categoria of categorias" [value]="categoria.idCategoria">
          📁 {{ categoria.categoria1 }}
        </option>
      </select>
      <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400 group-focus-within:text-blue-500 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M19 9l-7 7-7-7"></path></svg>
      </div>
    </div>
  </div>

  <div class="flex justify-end gap-3 pt-4 border-t border-slate-100 bg-slate-50/20 -mx-6 -mb-6 p-6">
    <button
      (click)="closeModal()"
      class="flex items-center gap-2 px-5 py-3 bg-white border-2 border-slate-200 text-slate-600 rounded-xl font-semibold hover:bg-slate-50 hover:border-slate-300 transition-all text-sm"
    >
      Cancelar
    </button>
    <button
      (click)="onSubmit()"
      class="flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-500/25 text-white rounded-xl font-semibold transition-all text-sm cursor-pointer"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
      Guardar Cambios
    </button>
  </div>
</div>
