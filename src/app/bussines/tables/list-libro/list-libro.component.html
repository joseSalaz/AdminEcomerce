<section class="shadow-sm">
  <div class="bg-white rounded-t-xl border border-gray-200 border-b-0 p-6 flex flex-col md:flex-row justify-between items-center gap-4">
    <h2 class="text-2xl font-bold text-gray-800">📚 Libros</h2>
    
    <div class="flex flex-col sm:flex-row w-full md:w-auto gap-3">
      <div class="relative w-full sm:w-64">
        <input [(ngModel)]="tituloBuscado" (keyup.enter)="buscar()" placeholder="Buscar título..."
          class="w-full bg-gray-50 border border-gray-300 text-gray-700 py-2 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" />
      </div>

      <select [(ngModel)]="estadoSeleccionado" (change)="buscar()" class="bg-gray-50 border border-gray-300 text-gray-700 py-2 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option [ngValue]="undefined">Todos</option>
        <option [ngValue]="true">Activos</option>
        <option [ngValue]="false">Inactivos</option>
      </select>
      
      <button (click)="mostrarTodos()" class="bg-gray-100 border border-gray-300 text-gray-600 px-3 py-2 rounded-lg hover:bg-gray-200 transition-all" title="Recargar todos">
        🔄
      </button>

      <button (click)="openCreateModal()" class="bg-transparent border border-gray-300 text-gray-700 font-medium px-4 py-2 rounded-lg hover:bg-gray-100 transition-all flex items-center justify-center gap-2">
        <span>+</span> Nuevo libro
      </button>
    </div>
  </div>

  <div class="bg-gray-50 p-4 md:p-6 rounded-b-xl border border-gray-200 flex flex-col gap-3">
    
    <div *ngIf="libros.length === 0" class="text-center py-8 text-gray-500">
      No se encontraron libros.
    </div>

    <div *ngFor="let libro of libros" class="bg-white border border-gray-200 rounded-xl p-4 flex flex-col md:flex-row items-start md:items-center justify-between gap-4 hover:border-gray-400 hover:shadow-md transition-all group">
      
      <div class="flex items-center gap-4 w-full md:w-auto overflow-hidden">
        <div class="w-14 h-14 shrink-0 rounded-lg overflow-hidden border border-gray-100 bg-gray-100 flex items-center justify-center">
          <img *ngIf="libro.imagen" [src]="libro.imagen" alt="Imagen de {{ libro.titulo }}" class="w-full h-full object-cover">
          <span *ngIf="!libro.imagen" class="text-2xl">📖</span>
        </div>
        
        <div class="flex flex-col truncate">
          <span class="font-semibold text-gray-800 text-base truncate" [title]="libro.titulo">
            {{ libro.titulo }}
          </span>
          <span class="text-sm text-gray-500 truncate">
            {{ libro.isbn || 'Sin ISBN' }} • Impresión: {{ libro.impresion }} • Condición: {{ libro.condicion }}
          </span>
        </div>
      </div>

      <div class="flex items-center justify-end gap-3 w-full md:w-auto mt-2 md:mt-0 pt-3 md:pt-0 border-t border-gray-100 md:border-none">
        <span class="px-3 py-1 text-xs font-semibold rounded-full border {{ libro.estado ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200' }}">
          {{ libro.estado ? 'Activo' : 'Inactivo' }}
        </span>
        
        <div class="flex gap-1">
          <button (click)="openEditModal(libro)" class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all" title="Editar">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
          </button>
          <button (click)="deleteLibro(libro.idLibro)" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all" title="Eliminar">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-200">
      <button (click)="prevPage()" [disabled]="currentPage === 1"
        class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-100 transition-all disabled:opacity-50 disabled:cursor-not-allowed text-sm font-medium">
        ⬅️ Anterior
      </button>
      <span class="text-gray-600 font-medium text-sm">Página {{ currentPage }}</span>
      <button (click)="nextPage()" [disabled]="!hasMoreData"
        class="px-4 py-2 bg-gray-800 text-white rounded-lg hover:bg-gray-900 transition-all disabled:opacity-50 disabled:cursor-not-allowed text-sm font-medium">
        Siguiente ➡️
      </button>
    </div>
  </div>
</section>

<div *ngIf="isModalOpen" class="fixed inset-0 bg-gray-900 bg-opacity-50 backdrop-blur-sm flex justify-center items-center z-50">
  <div class="bg-white p-8 rounded-xl shadow-2xl w-11/12 md:w-1/2 lg:w-1/3 max-h-screen overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold text-gray-800">{{ isEditMode ? 'Actualizar Libro' : 'Crear Libro' }}</h2>
      <button (click)="closeModal()" class="text-gray-500 hover:text-gray-700 text-2xl font-bold">&times;</button>
    </div>
    <app-mantenimiento-libro 
      [isEditMode]="isEditMode"
      [libro]="libroSeleccionado || { idLibro: 0, titulo: '', isbn: undefined, tamanno: '', descripcion: '', condicion: '', impresion: '', tipoTapa: '', estado: true, idSubcategoria: 0, idTipoPapel: 0, idProveedor: 0, imagen: '' }"
      [precioVenta]="precioVenta" 
      [Stock]="Stock" 
      (close)="closeModal()"
      (libroGuardado)="handleLibroGuardado()">
    </app-mantenimiento-libro>
  </div>
</div>
