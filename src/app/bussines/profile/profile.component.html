<div class="p-8 bg-white shadow-lg rounded-2xl">
  <h2 class="text-3xl font-semibold text-gray-800 mb-6 border-b pb-4 border-gray-200">Lista de Usuarios</h2>

  <div class="overflow-x-auto">
    <table class="min-w-full table-auto rounded-lg shadow-md">
      <thead class="bg-blue-950 text-white uppercase text-sm rounded-t-lg">
        <tr>
          <th class="px-6 py-3 text-center">Username</th>
          <th class="px-6 py-3 text-center">Cargo</th>
          <th class="px-6 py-3 text-center">Estado</th>
          <th class="px-6 py-3 text-center">Encargado</th>
          <th class="px-6 py-3 text-center">
            <button (click)="openCreateModal()" class="text-white bg-blue-300 hover:bg-blue-500 rounded-full p-2 transition duration-200">
              ➕
            </button>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let usuario of usuarios" class="border-b border-gray-200 hover:bg-gray-50 transition ease-in-out duration-300">
          <td class="px-6 py-4 text-center text-gray-700">{{ usuario?.username }}</td>
          <td class="px-6 py-4 text-center text-gray-700">{{ usuario?.cargo }}</td>
          <td class="px-6 py-4 text-center">
            <span [ngClass]="usuario?.estado ? 'text-green-600 font-semibold' : 'text-red-600 font-semibold'">
              {{ usuario?.estado ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
          <td class="px-6 py-4 text-center text-gray-700">
            {{ usuario?.nombrePersona || 'Sin nombre' }} {{usuario?.apellidoPaterno}} {{usuario?.apellidoMaterno}}
          </td>
          <td class="px-6 py-4 text-center">
            <div class="flex justify-center items-center space-x-4">
              <button (click)="openEditModal(usuario)" class="text-blue-500 hover:text-blue-700 transition-all duration-300 text-lg">
                ✏️
              </button>
              <button 
                *ngIf="usuario.idUsuario !== undefined" 
                (click)="cambiarEstado(usuario.idUsuario!, usuario.estado ?? false)"
                [title]="usuario.estado ? 'Desactivar' : 'Activar'" 
                class="text-xl p-2 rounded-full transition-all duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 transition-all duration-300" [ngClass]="usuario.estado ? 'text-green-500' : 'text-gray-500'">
                  <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="usuario.estado ? 'M5 12h14M12 5l7 7-7 7' : 'M19 12H5M12 19l-7-7 7-7'" />
                </svg>
              </button>
              <button (click)="deleteSub(usuario.idUsuario!)" class="text-red-500 hover:text-red-700 transition-all duration-300 text-lg">
                🗑️
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal para crear usuario -->
  <ng-container *ngIf="mostrarModalUsuario">
    <app-usuario [usuario]="usuario" (usuarioCreado)="obtenerUsuarios()" (cerrar)="closeCreateModal()"></app-usuario>
  </ng-container>
</div>
