<div class="fixed inset-0 flex items-center justify-center bg-gray-900 bg-opacity-50">
    <div class="bg-white p-6 rounded-xl shadow-2xl w-96">
      
      <!-- Título -->
      <h2 class="text-xl font-semibold text-blue-700 mb-4 text-center">Crear Nueva Persona</h2>
  
      <!-- Formulario -->
      <div class="grid gap-3">
        <input type="text" [(ngModel)]="nuevaPersona.nombre" placeholder="Nombre"
          class="border p-3 w-full rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          
        <input type="text" [(ngModel)]="nuevaPersona.apellidoPaterno" placeholder="Apellido Paterno"
          class="border p-3 w-full rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          
        <input type="text" [(ngModel)]="nuevaPersona.apellidoMaterno" placeholder="Apellido Materno"
          class="border p-3 w-full rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          
        <input type="email" [(ngModel)]="nuevaPersona.correo" placeholder="Correo"
          class="border p-3 w-full rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        
        <select [(ngModel)]="nuevaPersona.tipoDocumento"
          class="border p-3 w-full rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white">
          <option value="" disabled selected>Seleccione un tipo de documento</option>
          <option value="DNI">DNI</option>
          <option value="Pasaporte">Pasaporte</option>
          <option value="Carnet de Extranjería">Carnet de Extranjería</option>
        </select>
  
        <input type="text" [(ngModel)]="nuevaPersona.numeroDocumento" placeholder="Número de Documento"
          class="border p-3 w-full rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          
        <input type="text" [(ngModel)]="nuevaPersona.telefono" placeholder="Teléfono"
          class="border p-3 w-full rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
      </div>
  
      <!-- Botones -->
      <div class="mt-5 flex flex-col gap-2">
        <button (click)="guardarPersona()"
          class="bg-blue-600 hover:bg-blue-700 text-white font-semibold p-3 rounded-lg shadow-md transition">
          Guardar
        </button>
        <button (click)="cerrarModal()"
          class="text-blue-600 hover:text-blue-700 font-semibold p-3 rounded-lg transition">
          Cancelar
        </button>
      </div>
  
    </div>
  </div>
