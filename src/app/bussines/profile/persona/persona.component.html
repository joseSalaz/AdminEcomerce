<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl border border-slate-100 overflow-hidden transform transition-all p-6 space-y-4">
    
    <div class="flex items-center justify-between pb-3 border-b border-slate-100">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center text-blue-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0" />
            <path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2" />
          </svg>
        </div>
        <h2 class="text-xl font-bold text-slate-800 tracking-tight">Crear Nueva Persona</h2>
      </div>
      <button type="button" (click)="cerrarModal()" class="text-slate-400 hover:text-slate-600 hover:bg-slate-100 p-1.5 rounded-lg transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6l-12 12" />
          <path d="M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="space-y-3.5">
      
      <div class="flex flex-col">
        <label class="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">Nombre</label>
        <input type="text" [(ngModel)]="nuevaPersona.nombre" placeholder="Ej. Gabriel"
          class="border-2 border-slate-200 p-3 w-full rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-semibold text-slate-700 placeholder-slate-300">
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col">
          <label class="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">Ap. Paterno</label>
          <input type="text" [(ngModel)]="nuevaPersona.apellidoPaterno" placeholder="Ej. García"
            class="border-2 border-slate-200 p-3 w-full rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-semibold text-slate-700 placeholder-slate-300">
        </div>
        <div class="flex flex-col">
          <label class="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">Ap. Materno</label>
          <input type="text" [(ngModel)]="nuevaPersona.apellidoMaterno" placeholder="Ej. Márquez"
            class="border-2 border-slate-200 p-3 w-full rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-semibold text-slate-700 placeholder-slate-300">
        </div>
      </div>

      <div class="flex flex-col">
        <label class="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">Correo Electrónico</label>
        <input type="email" [(ngModel)]="nuevaPersona.correo" placeholder="ejemplo@correo.com"
          class="border-2 border-slate-200 p-3 w-full rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-semibold text-slate-700 placeholder-slate-300">
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col">
          <label class="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">Documento</label>
          <select [(ngModel)]="nuevaPersona.tipoDocumento"
            class="border-2 border-slate-200 p-3 w-full rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-bold text-slate-700 bg-white">
            <option value="" disabled selected>Seleccione</option>
            <option value="DNI">DNI</option>
            <option value="Pasaporte">Pasaporte</option>
            <option value="Carnet de Extranjería">C.E.</option>
          </select>
        </div>
        <div class="flex flex-col">
          <label class="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">N° Documento</label>
          <input type="text" [(ngModel)]="nuevaPersona.numeroDocumento" placeholder="00000000"
            class="border-2 border-slate-200 p-3 w-full rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-mono font-bold text-slate-700 placeholder-slate-300">
        </div>
      </div>

      <div class="flex flex-col">
        <label class="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">Teléfono de Contacto</label>
        <input type="text" [(ngModel)]="nuevaPersona.telefono" placeholder="+51 999 999 999"
          class="border-2 border-slate-200 p-3 w-full rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-semibold text-slate-700 placeholder-slate-300">
      </div>
    </div>

    <div class="flex justify-end gap-3 pt-4 border-t border-slate-100 bg-slate-50/40 -mx-6 -mb-6 p-6 mt-4">
      <button type="button" (click)="cerrarModal()" 
        class="px-5 py-3 bg-white border-2 border-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-50 hover:border-slate-300 transition-all text-sm">
        Cancelar
      </button>
      
      <button (click)="guardarPersona()" type="button"
        class="flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-500/25 text-white rounded-xl font-bold transition-all text-sm cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 4h10l4 4v10a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12a2 2 0 0 1 2 -2" />
          <path d="M12 14m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
          <path d="M14 4l0 4l-4 0l0 -4" />
        </svg>
        Registrar Persona
      </button>
    </div>

  </div>
</div>
